version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: cixci_redis_${ENV_NAME}
    ports:
      - "${REDIS_PORT}:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cixci_backend_${ENV_NAME}
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - FRONTEND_URL=${FRONTEND_URL}
      - USE_GCS=${USE_GCS}
      - GS_BUCKET_NAME=${GS_BUCKET_NAME}
    depends_on:
      - redis
    restart: always

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cixci_celery_${ENV_NAME}
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: cixci_frontend_${ENV_NAME}
    ports:
      - "${FRONTEND_PORT}:80"
    restart: always
