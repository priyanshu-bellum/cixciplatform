# 1. Test Environment (testnew.cixci.com)
server {
    listen 80;
    server_name testnew.cixci.com;
    
    # Increase maximum allowed upload size (for ZIP/images)
    client_max_body_size 100M;

    # Django Static Files
    location /static/ {
        alias /srv/cixci/test/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Django Media Files (if local storage is used instead of GCS)
    location /media/ {
        alias /srv/cixci/test/backend/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Backend API & Admin
    location ~ ^/(api|admin) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend React App
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

